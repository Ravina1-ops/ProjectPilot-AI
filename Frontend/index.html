<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectPilot AI - ML Blueprint Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <div class="max-w-5xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                ProjectPilot AI
            </h1>
            <p class="text-gray-400 mt-2">AI-Powered Machine Learning Project Blueprint Generator</p>
        </header>

        <!-- Input Section -->
        <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 mb-8">
            <form id="blueprintForm" class="space-y-4">
                <label class="block text-sm font-medium text-gray-300">Enter your Machine Learning Project Idea:</label>
                <textarea id="projectIdea" rows="3" required
                    class="w-full p-4 bg-gray-950 border border-gray-700 rounded-lg text-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none placeholder-gray-500"
                    placeholder="e.g., Fake News Detection using NLP and Logistic Regression..."></textarea>
                <button type="submit" id="submitBtn"
                    class="w-full py-3 bg-gradient-to-r from-blue-600 to-emerald-600 hover:from-blue-500 hover:to-emerald-500 font-bold rounded-lg transition dynamic-btn">
                    Launch Pilot Engine
                </button>
            </form>
        </div>

        <!-- Output Dynamic Screen -->
        <div id="outputContainer" class="hidden bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
            <h2 class="text-xl font-bold text-blue-400 mb-4 border-b border-gray-700 pb-2">Generated Blueprint Layout:</h2>
            <!-- Dynamic streaming output will print here -->
            <pre id="outputScreen" class="whitespace-pre-wrap font-mono text-sm text-gray-300 leading-relaxed bg-gray-950 p-4 rounded-lg overflow-x-auto"></pre>
        </div>
    </div>

    <script>
        document.getElementById('blueprintForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const idea = document.getElementById('projectIdea').value;
            const outputContainer = document.getElementById('outputContainer');
            const outputScreen = document.getElementById('outputScreen');
            const submitBtn = document.getElementById('submitBtn');

            outputContainer.classList.remove('hidden');
            outputScreen.textContent = "Connecting to Gemini Engine via FastAPI...\n";
            submitBtn.disabled = true;
            submitBtn.textContent = "Vectorizing Chunks...";

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project_idea: idea })
                });

                if (!response.body) {
                    outputScreen.textContent = "Error: No streaming pipeline established.";
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                outputScreen.textContent = ""; // Clear loader text

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    outputScreen.textContent += chunk;
                }
            } catch (error) {
                outputScreen.textContent += `\n\n[System Error]: Failed to connect to server. Ensure your FastAPI backend terminal is running.`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Launch Pilot Engine";
            }
        });
    </script>
</body>
</html>
